services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mathboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mathboard_secret}
      POSTGRES_DB: mathboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - mathboard_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/sushi86/learning_plattform:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://mathboard:${POSTGRES_PASSWORD:-mathboard_secret}@db:5432/mathboard?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      AI_PROVIDER: ${AI_PROVIDER:-claude}
      AI_API_KEY: ${AI_API_KEY}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    volumes:
      - uploads:/app/uploads
    networks:
      - npm_default
      - mathboard_internal
    depends_on:
      db:
        condition: service_healthy

  migrate:
    image: ghcr.io/sushi86/learning_plattform:latest
    environment:
      DATABASE_URL: postgresql://mathboard:${POSTGRES_PASSWORD:-mathboard_secret}@db:5432/mathboard?schema=public
    command: npx prisma migrate deploy
    networks:
      - mathboard_internal
    depends_on:
      db:
        condition: service_healthy

networks:
  npm_default:
    external: true
  mathboard_internal:
    internal: true

volumes:
  pgdata:
  uploads:
